<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lang Utils - Chat</title>
  <link rel="stylesheet" href="chatbot.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1 data-i18n="chatbot_title">💬 Lang Utils Chat</h1>
      <button id="close-btn" class="close-btn">✕</button>
    </div>

    <div class="context-box" id="context-box">
      <div class="context-label" data-i18n="chatbot_context_label">📄 Texto seleccionado:</div>
      <div class="context-text" id="context-text"></div>
    </div>

    <div class="messages-container" id="messages">
      <div class="message ai-message">
        <div class="message-content" data-i18n="chatbot_greeting">
          ¡Hola! Soy tu asistente de Lang Utils. Puedo ayudarte a analizar, traducir, resumir o explicar el texto seleccionado. ¿Qué te gustaría saber?
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" data-i18n-placeholder="chatbot_input_placeholder" placeholder="Escribe tu pregunta sobre el texto..." rows="2"></textarea>
        <button id="send-btn" class="send-btn">➤</button>
      </div>
      <div class="quick-prompts">
        <button class="quick-btn" data-prompt-key="chatbot_summarize_prompt" data-prompt="Resume este texto" data-i18n="chatbot_summarize">📝 Resumir</button>
        <button class="quick-btn" data-prompt-key="chatbot_explain_prompt" data-prompt="Explica este texto en términos simples" data-i18n="chatbot_explain">💡 Explicar</button>
        <button class="quick-btn" data-prompt-key="chatbot_keypoints_prompt" data-prompt="¿Cuáles son los puntos clave de este texto?" data-i18n="chatbot_keypoints">🔑 Puntos clave</button>
        <button class="quick-btn" data-prompt-key="chatbot_translate_en_prompt" data-prompt="Traduce este texto al inglés" data-i18n="chatbot_translate_en">🌐 Traducir EN</button>
        <button class="quick-btn" data-prompt-key="chatbot_translate_es_prompt" data-prompt="Traduce este texto al español" data-i18n="chatbot_translate_es">🌐 Traducir ES</button>
      </div>
    </div>
  </div>

  <script src="../i18n.js"></script>
  <script src="../utils.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
