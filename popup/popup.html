<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popup_title">Lang Utils</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-info">
        <h1 data-i18n="popup_title">Lang Utils</h1>
        <div class="status-section">
          <span id="status-dot" class="status-dot offline"></span>
          <span id="status-text" class="status-text" data-i18n="popup_status_verifying">Verificando...</span>
        </div>
        <div id="model-info" class="model-info"></div>
      </div>
      <button class="close-btn" id="close-popup-btn" data-i18n-title="content_close" title="Cerrar">&#10005;</button>
    </div>

    <!-- Body -->
    <div class="popup-body">
      <!-- Favorites -->
      <div id="favorites-section" class="favorites-section" style="display:none">
        <div class="section-label"><span class="star-icon">&#11088;</span> <span data-i18n="popup_favorites">Favoritos</span></div>
        <div id="favorites-list" class="favorites-list"></div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="action-btn" id="settings-btn">
          &#9881;&#65039; <span data-i18n="popup_settings">Configuracion</span>
        </button>
        <button class="action-btn" id="open-chatbot-btn">
          &#128172; <span data-i18n="popup_chatbot">Chatbot</span>
        </button>
      </div>

      <!-- All Modes -->
      <div class="modes-section">
        <div class="section-label" data-i18n="popup_available_modes">Modos disponibles</div>
        <div id="popup-modes-list" class="modes-list"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span class="version">v1.0.0</span>
    </div>
  </div>

  <script src="../i18n.js"></script>
  <script src="../utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
